services:
  mysql:
    image: mysql:8.4
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_0900_ai_ci"]
    environment:
      MYSQL_DATABASE: cleancare
      MYSQL_USER: cleancare
      MYSQL_PASSWORD: cleancare
      MYSQL_ROOT_PASSWORD: root-cleancare
      TZ: UTC
    ports:
      - "${CLEANCARE_MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ucleancare", "-pcleancare"]
      interval: 5s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${CLEANCARE_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.13.4
    ports:
      - "${CLEANCARE_QDRANT_PORT:-6333}:6333"
      - "${CLEANCARE_QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  app:
    profiles: ["app"]
    build:
      context: .
    ports:
      - "8080:8080"
    environment:
      CLEANCARE_APP_ENV: docker
      CLEANCARE_AGENT_MODE: agentic
      CLEANCARE_STORAGE_CONVERSATION_REPOSITORY: mysql
      CLEANCARE_MYSQL_ENABLED: "true"
      CLEANCARE_MYSQL_DSN: ${CLEANCARE_MYSQL_DSN:-cleancare:cleancare@tcp(mysql:3306)/cleancare?charset=utf8mb4&parseTime=true&loc=UTC}
      CLEANCARE_MYSQL_AUTO_MIGRATE: "true"
      CLEANCARE_REDIS_ENABLED: "true"
      CLEANCARE_REDIS_ADDRESS: redis:6379
      CLEANCARE_QDRANT_ENABLED: "true"
      CLEANCARE_QDRANT_BASE_URL: http://qdrant:6333
      CLEANCARE_QDRANT_ENSURE_COLLECTION: "true"
      CLEANCARE_EMBEDDING_PROVIDER: local_hash
      CLEANCARE_EMBEDDING_DIMENSION: "1024"
      CLEANCARE_LLM_PROVIDER: extractive
      CLEANCARE_RATE_LIMIT_BACKEND: redis
      CLEANCARE_TRACING_ENABLED: "true"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

volumes:
  mysql_data:
  redis_data:
  qdrant_data:
