app:
  name: clean-care-agent
  env: local

server:
  host: 0.0.0.0
  port: 8080
  read_timeout: 10s
  write_timeout: 30s
  idle_timeout: 60s
  shutdown_timeout: 10s

log:
  level: info
  development: true

auth:
  enabled: false
  development_user_id: demo-user
  # 生产环境通过 CLEANCARE_AUTH_JWT_SECRET 等环境变量注入，禁止提交真实密钥。
  jwt_secret: ""
  jwt_issuer: clean-care-agent
  jwt_leeway: 30s
  admin_api_key: ""

rate_limit:
  enabled: true
  backend: local
  requests_per_second: 20
  burst: 40

agent:
  # bootstrap | naive_rag | agentic
  mode: bootstrap
  # react | plan_execute | auto
  planning_mode: auto
  # Optional YAML workflow definitions. Empty keeps the built-in five Skill definitions.
  skill_config_path: configs/skills.example.yaml
  max_steps: 5
  token_budget: 6000
  timeout: 20s

storage:
  # memory | mysql
  conversation_repository: memory

mysql:
  enabled: false
  dsn: cleancare:cleancare@tcp(127.0.0.1:3306)/cleancare?parseTime=true&charset=utf8mb4&loc=UTC&multiStatements=true
  max_open_conns: 20
  max_idle_conns: 10
  conn_max_lifetime: 30m
  conn_max_idle_time: 5m
  ping_timeout: 3s
  auto_migrate: false

redis:
  enabled: false
  address: 127.0.0.1:6379
  password: ""
  db: 0
  dial_timeout: 3s
  read_timeout: 2s
  write_timeout: 2s
  session_ttl: 24h
  recent_messages: 10
  ingest_stream_enabled: false
  ingest_stream: cleancare:kb:ingest
  ingest_consumer_group: cleancare-kb-workers
  ingest_consumer_name: worker-1
  ingest_block_timeout: 2s
  ingest_claim_idle: 1m
  ingest_batch_size: 8
  ingest_max_retries: 3
  ingest_dead_letter_name: cleancare:kb:ingest:dead

qdrant:
  enabled: false
  base_url: http://127.0.0.1:6333
  api_key: ""
  collection: clean_care_kb
  vector_size: 1024
  distance: cosine
  request_timeout: 5s
  ensure_collection: true

readiness:
  timeout: 2s

# Embedding provider configuration.
# local_hash: deterministic, zero-dependency, for local dev only.
# openai_compatible: any OpenAI-compatible embeddings endpoint.
embedding:
  provider: local_hash
  endpoint: ""
  api_key: ""
  model: local-hash-v1
  dimension: 1024
  request_timeout: 15s
  batch_size: 16
  failure_threshold: 5
  open_timeout: 1m
  fallbacks: []
  # Optional priority-sorted providers. When non-empty, this list replaces
  # endpoint/model + fallbacks.
  providers: []

# Example: SiliconFlow (硅基流动) BGE embedding
# embedding:
#   provider: openai_compatible
#   endpoint: https://api.siliconflow.cn/v1/embeddings
#   api_key: sk-your-siliconflow-key
#   model: BAAI/bge-large-zh-v1.5
#   dimension: 1024

rag:
  dense_top_k: 20
  keyword_top_k: 20
  rerank_top_k: 6
  min_dense_score: 0.05
  max_chunk_runes: 1200
  chunk_overlap: 120
  chunk_profiles:
    product_detail: {max_chunk_runes: 1400, chunk_overlap: 120, semantic_threshold: 0.68}
    product_parameter: {max_chunk_runes: 1200, chunk_overlap: 0}
    product_comparison: {max_chunk_runes: 2000, chunk_overlap: 0}
    purchase_guide: {max_chunk_runes: 1400, chunk_overlap: 120, semantic_threshold: 0.72}
    accessory_compatibility: {max_chunk_runes: 1600, chunk_overlap: 0}
    user_manual: {max_chunk_runes: 1600, chunk_overlap: 80}
    troubleshooting: {max_chunk_runes: 600, chunk_overlap: 0}
    after_sales_policy: {max_chunk_runes: 800, chunk_overlap: 0}
    faq: {max_chunk_runes: 400, chunk_overlap: 0}
  max_answer_runes: 900
  retrieval_cache_ttl: 5m

# Reranker provider configuration.
# local_lexical: deterministic local fallback.
# openai_compatible: bge-reranker/gte-rerank compatible HTTP endpoint.
reranker:
  provider: local_lexical
  endpoint: ""
  api_key: ""
  model: ""
  request_timeout: 10s
  failure_threshold: 5
  open_timeout: 1m
  fallbacks: []

# Example: SiliconFlow bge-reranker
# reranker:
#   provider: openai_compatible
#   endpoint: https://api.siliconflow.cn/v1/rerank
#   api_key: sk-your-siliconflow-key
#   model: BAAI/bge-reranker-v2-m3
#   request_timeout: 10s

# LLM provider configuration.
# extractive: rule-based, no API calls (local fallback).
# openai_compatible: any OpenAI-compatible chat completions endpoint.
llm:
  provider: extractive
  endpoint: ""
  api_key: ""
  model: ""
  request_timeout: 30s
  first_token_timeout: 3s
  max_tokens: 800
  temperature: 0.1
  failure_threshold: 5
  open_timeout: 1m
  fallbacks: []

# Example: DeepSeek API
# llm:
#   provider: openai_compatible
#   endpoint: https://api.deepseek.com/v1/chat/completions
#   api_key: sk-your-deepseek-key
#   model: deepseek-chat
#   request_timeout: 30s
#   max_tokens: 2048
#   temperature: 0.1
#   fallbacks:
#     - endpoint: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
#       api_key: sk-your-dashscope-key
#       model: qwen-plus
#       request_timeout: 30s
#       max_tokens: 2048
#       temperature: 0.1

tool:
  timeout: 3s

# Prompt management and LLM enrichment.
# When enable_llm_components is true and llm.provider is openai_compatible,
# the agentic runner will use LLM-powered intent classification, query rewriting,
# ReAct planning, reflection checking, and clarification generation.
prompt:
  enable_llm_components: false
  # intent_classifier_model overrides llm.model for intent classification
  # (leave empty to use the main llm.model). Useful for cost optimization:
  # use a smaller/cheaper model for classification, larger for generation.
  intent_classifier_model: ""
  query_rewrite_model: ""
  planner_model: ""
  reflection_model: ""
  clarifier_model: ""
  generation_model: ""
  summarizer_model: ""
  eval_judge_model: ""

tracing:
  enabled: false
  service_name: clean-care-agent
  service_version: dev
  # Example: http://127.0.0.1:4318
  otlp_endpoint: ""
  insecure: true
  sample_ratio: 1.0
