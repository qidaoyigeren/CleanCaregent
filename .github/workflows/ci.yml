name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify module files
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      - name: Test
        run: go test ./...
      - name: Race test
        run: go test -race ./...
      - name: Vet
        run: go vet ./...
      - name: Build server
        run: go build ./cmd/server

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clean-care-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: clean-care-frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t cleancare-agent:ci .
