name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify module files
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      - name: Test
        run: go test ./...
      - name: Race test
        run: go test -race ./...
      - name: Vet
        run: go vet ./...
      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
      - name: Build server
        run: go build ./cmd/server
      - name: Build MCP server
        run: go build ./cmd/mcp-server

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clean-care-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: clean-care-frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  container:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t cleancare-agent:ci .
      - name: Generate SBOM
        uses: anchore/sbom-action@v0.24.0
        with:
          image: cleancare-agent:ci
          format: spdx-json
          output-file: cleancare-agent.spdx.json
      - name: Scan container image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: cleancare-agent:ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: cleancare-agent-sbom
          path: cleancare-agent.spdx.json

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend, container]
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: cleancare
          MYSQL_USER: cleancare
          MYSQL_PASSWORD: cleancare
          MYSQL_ROOT_PASSWORD: root-cleancare
          TZ: UTC
        ports:
          - 13306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ucleancare -pcleancare"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run agentic MCP e2e
        run: make e2e-agentic-mcp
      - name: Upload e2e logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-agentic-mcp-logs
          path: .e2e/
          if-no-files-found: ignore
