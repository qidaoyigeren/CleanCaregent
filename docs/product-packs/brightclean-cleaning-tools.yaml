compatibility:
  - host_model: BM-M1
    accessory_model: BM-M1-PAD
    accessory_type: mop_pad
    status: compatible
    reason: BM-M1-PAD uses the same 38cm hook-and-loop pad interface as BM-M1.
    evidence_doc_id: kb_breeze_mop_m1_detail
  - host_model: WS2
    accessory_model: WS2-RB
    accessory_type: rubber_blade
    status: compatible
    reason: WS2-RB matches the 25cm WS2 blade rail and end-cap lock.
    evidence_doc_id: kb_window_squeegee_ws2_params
  - host_model: BM-M1
    accessory_model: WS2-RB
    accessory_type: rubber_blade
    status: incompatible
    reason: WS2-RB is a glass squeegee rubber blade and does not fit the BM-M1 mop head.
    evidence_doc_id: kb_window_squeegee_ws2_params

diagnosis:
  - id: bm_m1_pad_slip
    product_model: BM-M1
    symptom: pad slip
    question: Is the mop pad clipped into both side slots?
    guidance: Turn the mop over and check whether both side clips hold the pad edge.
    yes_next: bm_m1_pad_dirty
    no_next: bm_m1_reclip_pad
    safety_level: low
    evidence_doc_id: kb_breeze_mop_m1_detail
    root: true
  - id: bm_m1_reclip_pad
    product_model: BM-M1
    symptom: pad slip
    resolution: Reinstall the pad and press both side clips until they lock.
    terminal: true
    safety_level: low
    evidence_doc_id: kb_breeze_mop_m1_detail
  - id: bm_m1_pad_dirty
    product_model: BM-M1
    symptom: pad slip
    resolution: Wash or replace the pad if lint blocks the hook surface.
    terminal: true
    safety_level: low
    evidence_doc_id: kb_breeze_mop_m1_detail

  - id: ws2_streaks_blade
    product_model: WS2
    symptom: streaks
    question: Is the rubber blade chipped, hardened, or visibly wavy?
    guidance: Rinse the blade and inspect the full 25cm edge under light.
    yes_next: ws2_replace_blade
    no_next: ws2_clean_angle
    safety_level: low
    evidence_doc_id: kb_window_squeegee_ws2_params
    root: true
  - id: ws2_replace_blade
    product_model: WS2
    symptom: streaks
    resolution: Replace the blade with WS2-RB and test on a clean wet glass edge.
    terminal: true
    safety_level: low
    evidence_doc_id: kb_window_squeegee_ws2_params
  - id: ws2_clean_angle
    product_model: WS2
    symptom: streaks
    resolution: Clean the glass first and keep the blade at a stable shallow angle while pulling downward.
    terminal: true
    safety_level: low
    evidence_doc_id: kb_window_squeegee_ws2_params

safety_keywords:
  - chemical burn
  - strong bleach smell
